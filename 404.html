<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>404 — Page Not Found</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--text-primary:#1a1708;--text-secondary:#6b6540;
  --border:#d8d0bc;--answer-bg:#ede8dc;--green:#2d6a4f;
  --btn-bg:#1a1708;--btn-color:#fff;
}
[data-theme="dark"]{
  --bg:#0f0f0f;--text-primary:#f0ebe0;--text-secondary:#9a9070;
  --border:#2e2b22;--answer-bg:#1c1b16;--btn-bg:#f0ebe0;--btn-color:#1a1708;
}
*{cursor:none!important}
.cursor-dot{position:fixed;top:0;left:0;width:8px;height:8px;background:var(--text-primary);border-radius:50%;pointer-events:none;z-index:9999;will-change:transform;transform:translate3d(-200px,-200px,0);transition:background .3s,opacity .3s;opacity:0}
.cursor-ring{position:fixed;top:0;left:0;width:36px;height:36px;border:2px solid rgba(26,23,8,.3);border-radius:50%;pointer-events:none;z-index:9998;will-change:transform;transform:translate3d(-200px,-200px,0);transition:border-color .3s,width .2s,height .2s,opacity .3s;opacity:0}
[data-theme="dark"] .cursor-ring{border-color:rgba(240,235,224,.3)}
.cursor-ring.hovering{width:50px;height:50px;border-color:var(--text-primary)}
.cursor-dot.clicking{width:4px;height:4px}

html,body{height:100%;font-family:'DM Sans',sans-serif;color:var(--text-primary);overflow:hidden;-webkit-tap-highlight-color:transparent}

/* Aurora bg */
.aurora-bg{position:fixed;inset:0;z-index:0;background:var(--bg);transition:background .6s}
#auroraCanvas{position:absolute;inset:0;width:100%;height:100%}

/* Grain */
.grain{position:fixed;inset:0;z-index:1;pointer-events:none}
.grain::before{content:'';position:absolute;inset:-50%;width:200%;height:200%;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;opacity:.05;mix-blend-mode:multiply;animation:grainShift .9s steps(1) infinite}
@keyframes grainShift{0%{transform:translate(0,0)}25%{transform:translate(-2%,-3%)}50%{transform:translate(3%,1%)}75%{transform:translate(-1%,3%)}100%{transform:translate(0,0)}}

/* Spotlight */
.spotlight{position:fixed;inset:0;z-index:2;pointer-events:none}

/* Glass card */
.card-wrap{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;padding:24px}
.card{
  background:rgba(255,253,248,0.55);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid rgba(255,255,255,0.7);
  border-radius:28px;
  box-shadow:0 8px 40px rgba(60,50,20,.12), 0 2px 8px rgba(60,50,20,.08);
  padding:56px 52px;
  max-width:520px;width:100%;
  text-align:center;
  position:relative;overflow:hidden;
}
[data-theme="dark"] .card{background:rgba(20,18,12,.55);border-color:rgba(255,255,255,.08);box-shadow:0 8px 40px rgba(0,0,0,.4)}
.card::before{content:'';position:absolute;top:0;left:5%;right:5%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.8) 50%,transparent);border-radius:100%}
[data-theme="dark"] .card::before{background:linear-gradient(90deg,transparent,rgba(255,255,255,.12) 50%,transparent)}

/* 404 number */
.err-number{
  font-family:'Playfair Display',serif;
  font-size:clamp(80px,18vw,140px);
  font-weight:900;
  line-height:1;
  margin-bottom:8px;
  background:linear-gradient(160deg,#1a1708 0%,#3d2e0a 40%,#1a1708 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:block;
  animation:float404 4s ease-in-out infinite;
}
[data-theme="dark"] .err-number{background:linear-gradient(160deg,#f5f0e8 0%,#e8dcc8 45%,#c8b898 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
@keyframes float404{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.err-emoji{font-size:36px;margin-bottom:16px;display:block;animation:wobble 2.5s ease-in-out infinite}
@keyframes wobble{0%,100%{transform:rotate(0)}20%{transform:rotate(-8deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-4deg)}80%{transform:rotate(4deg)}}

.err-title{font-family:'Playfair Display',serif;font-size:clamp(22px,4vw,32px);font-weight:900;color:var(--text-primary);margin-bottom:10px;line-height:1.2}
.err-sub{font-size:15px;color:var(--text-secondary);line-height:1.6;margin-bottom:36px;max-width:360px;margin-left:auto;margin-right:auto}

.btn-home{display:inline-flex;align-items:center;gap:10px;padding:14px 28px;background:var(--btn-bg);color:var(--btn-color);border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;letter-spacing:.2px;position:relative;overflow:hidden;transition:opacity .2s,transform .15s}
.btn-home:hover{opacity:.88;transform:translateY(-2px)}
.btn-home svg{width:16px;height:16px;flex-shrink:0}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);width:10px;height:10px;pointer-events:none;animation:rpl .55s ease-out forwards}
@keyframes rpl{0%{transform:translate(-50%,-50%) scale(0);opacity:.5}100%{transform:translate(-50%,-50%) scale(4);opacity:0}}

/* Floating particles */
.particle{position:fixed;border-radius:50%;pointer-events:none;z-index:3;animation:floatParticle linear infinite}
@keyframes floatParticle{0%{transform:translateY(110vh) rotate(0deg);opacity:0}10%{opacity:.6}90%{opacity:.4}100%{transform:translateY(-20px) rotate(360deg);opacity:0}}

/* Theme toggle */
.theme-toggle{position:fixed;top:max(22px,env(safe-area-inset-top));right:24px;z-index:90;width:44px;height:24px;border-radius:12px;background:var(--answer-bg);border:1.5px solid var(--border);position:fixed;transition:background .3s}
.theme-knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--btn-bg);display:flex;align-items:center;justify-content:center;font-size:10px;transition:transform .3s}
[data-theme="dark"] .theme-knob{transform:translateX(20px)}

@media(max-width:500px){
  .card{padding:36px 24px;border-radius:20px}
  .err-sub{font-size:14px}
  .btn-home{font-size:14px;padding:12px 22px}
}
</style>
</head>
<body>

<div class="aurora-bg"><canvas id="auroraCanvas"></canvas></div>
<div class="grain"></div>
<div class="spotlight" id="spotlight"></div>

<button class="theme-toggle" onclick="toggleTheme()" style="position:fixed;top:max(22px,env(safe-area-inset-top));right:24px;z-index:90">
  <div class="theme-knob" id="themeKnob">☀️</div>
</button>

<div class="card-wrap">
  <div class="card">
    <span class="err-emoji">🗺️</span>
    <span class="err-number">404</span>
    <h1 class="err-title">Oops, wrong turn.</h1>
    <p class="err-sub">The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
    <a href="index.html" class="btn-home" id="homeBtn">
      Take me home
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    </a>
  </div>
</div>

<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<script>
// Theme
function toggleTheme(){
  const isDark = document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme', isDark?'light':'dark');
  document.getElementById('themeKnob').textContent = isDark?'☀️':'🌙';
  try{localStorage.setItem('lf_theme', isDark?'light':'dark');}catch(e){}
}
(function(){
  try{const t=localStorage.getItem('lf_theme');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.getElementById('themeKnob').textContent='🌙';}}catch(e){}
})();

// Aurora
(function(){
  const canvas=document.getElementById('auroraCanvas');
  const ctx=canvas.getContext('2d');
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  resize(); window.addEventListener('resize',resize);
  const LB=[
    {x:.2,y:.4,rx:.5,ry:.4,r:0,vr:.000025,vx:.000015,vy:.000012,color:'rgba(180,140,255,'},
    {x:.7,y:.6,rx:.45,ry:.42,r:1.1,vr:-.000020,vx:-.000014,vy:.000016,color:'rgba(80,200,200,'},
    {x:.5,y:.2,rx:.42,ry:.36,r:2.2,vr:.000022,vx:.000011,vy:.000018,color:'rgba(255,160,120,'},
    {x:.3,y:.8,rx:.38,ry:.32,r:3.5,vr:-.000018,vx:.000020,vy:-.000013,color:'rgba(100,220,160,'},
  ];
  const DB=[
    {x:.2,y:.4,rx:.5,ry:.4,r:0,vr:.000025,vx:.000015,vy:.000012,color:'rgba(100,40,180,'},
    {x:.7,y:.6,rx:.45,ry:.42,r:1.1,vr:-.000020,vx:-.000014,vy:.000016,color:'rgba(20,120,140,'},
    {x:.5,y:.2,rx:.42,ry:.36,r:2.2,vr:.000022,vx:.000011,vy:.000018,color:'rgba(160,60,40,'},
    {x:.3,y:.8,rx:.38,ry:.32,r:3.5,vr:-.000018,vx:.000020,vy:-.000013,color:'rgba(20,140,80,'},
  ];
  let t=0;
  function draw(){
    const W=canvas.width,H=canvas.height;
    const isDark=document.documentElement.getAttribute('data-theme')==='dark';
    const blobs=isDark?DB:LB; const alpha=isDark?.38:.26;
    ctx.clearRect(0,0,W,H);
    blobs.forEach(b=>{
      const cx=(b.x+Math.sin(t*b.vx*1000+b.r)*.18)*W;
      const cy=(b.y+Math.cos(t*b.vy*1000+b.r)*.15)*H;
      const angle=b.r+t*b.vr*1000;
      const rx=b.rx*W*(.9+.1*Math.sin(t*.0003+b.r));
      const ry=b.ry*H*(.9+.1*Math.cos(t*.0004+b.r));
      ctx.save();ctx.translate(cx,cy);ctx.rotate(angle);
      const grad=ctx.createRadialGradient(0,0,0,0,0,Math.max(rx,ry));
      grad.addColorStop(0,b.color+alpha+')');
      grad.addColorStop(.5,b.color+(alpha*.5)+')');
      grad.addColorStop(1,b.color+'0)');
      ctx.scale(1,ry/rx);ctx.beginPath();ctx.arc(0,0,rx,0,Math.PI*2);
      ctx.fillStyle=grad;ctx.fill();ctx.restore();
    });
    t++;requestAnimationFrame(draw);
  }
  draw();
})();

// Floating particles
const PC=['#f4c430','#e74c3c','#3498db','#2ecc71','#9b59b6','#e67e22'];
for(let i=0;i<12;i++){
  const p=document.createElement('div');p.className='particle';
  const size=4+Math.random()*6;
  p.style.cssText=`width:${size}px;height:${size}px;background:${PC[i%PC.length]};left:${Math.random()*100}vw;animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*8}s;opacity:.5`;
  document.body.appendChild(p);
}

// Spotlight
const sp=document.getElementById('spotlight');
document.addEventListener('mousemove',e=>{
  if(sp) sp.style.background=`radial-gradient(circle 280px at ${e.clientX}px ${e.clientY}px,rgba(255,255,255,0.07) 0%,transparent 70%)`;
  dot.style.opacity='1';ring.style.opacity='1';
  setDot(e.clientX,e.clientY);
},{passive:true});

// Cursor
const dot=document.getElementById('cursorDot'),ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
function setDot(x,y){dot.style.transform=`translate3d(${x-4}px,${y-4}px,0)`;}
function setRing(x,y){ring.style.transform=`translate3d(${x-18}px,${y-18}px,0)`;}
(function lr(){rx+=(mx-rx)*.15;ry+=(my-ry)*.15;setRing(rx,ry);requestAnimationFrame(lr);})();
document.querySelectorAll('a,button').forEach(el=>{
  el.addEventListener('mouseenter',()=>ring.classList.add('hovering'));
  el.addEventListener('mouseleave',()=>ring.classList.remove('hovering'));
});
document.addEventListener('mousedown',()=>dot.classList.add('clicking'));
document.addEventListener('mouseup',()=>dot.classList.remove('clicking'));

// Ripple on button
document.getElementById('homeBtn').addEventListener('click',function(e){
  const r=document.createElement('span');r.className='ripple';
  const rect=this.getBoundingClientRect();
  r.style.left=(e.clientX-rect.left)+'px';r.style.top=(e.clientY-rect.top)+'px';
  this.appendChild(r);setTimeout(()=>r.remove(),600);
});
</script>
</body>
</html>
